<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            background:#fff;
            padding:35px;
            width:400px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            text-align:center;
        }

        .logo{
            width:120px;
            margin-bottom:15px;
        }

        h2{
            color:#003366;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:20px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#003366;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#777;
        }
    </style>
</head>
<body>

<div class="container">

    <img src="/logo.png" alt="Logo" class="logo">

    <h2>Certificate Verification</h2>

    <p>Enter your certificate number to verify.</p>

    <form onsubmit="verifyCertificate(event)">
        <input
            type="text"
            id="certNo"
            placeholder=""
            required
        >

        <button type="submit">Verify Certificate</button>
    </form>

    <div class="footer">
        © Thiruvalluvar CNC Training Centre
    </div>

</div>

<script>
function verifyCertificate(event) {
    event.preventDefault();

    const certNo = document
        .getElementById('certNo')
        .value
        .trim()
        .toUpperCase();

    window.location.href = '/verify/' + certNo + '.html';
}
</script>

</body>
</html>
